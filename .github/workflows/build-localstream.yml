name: Build LocalStream Extension

on:
  push:
    paths:
      - 'src/all/localstream/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Auto-Fix Code Formatting (Spotless)
        run: ./gradlew :src:all:localstream:spotlessApply

      - name: Build APK
        run: ./gradlew :src:all:localstream:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalStream-Anime-Extension
          path: src/all/localstream/build/outputs/apk/debug/*.apk

